<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ESP32 Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

<div x-data="controller()" class="text-center space-y-6">
    <h1 class="text-3xl font-bold">ESP32 WASD Controller</h1>

    <button 
        @click="connect"
        class="px-6 py-3 bg-blue-600 rounded-xl hover:bg-blue-700 transition"
    >
        Connect
    </button>

    <p class="text-lg">
        Status: 
        <span :class="connected ? 'text-green-400' : 'text-red-400'">
            <span x-text="connected ? 'Connected' : 'Disconnected'"></span>
        </span>
    </p>

    <div class="grid grid-cols-3 gap-4 w-40 mx-auto text-xl font-bold">
        <div></div>
        <div :class="keyState.q ? 'bg-green-500' : 'bg-gray-700'" class="p-4 rounded">Q</div>
        <div :class="keyState.w ? 'bg-green-500' : 'bg-gray-700'" class="p-4 rounded">W</div>
        <div :class="keyState.e ? 'bg-green-500' : 'bg-gray-700'" class="p-4 rounded">E</div>
        <div></div>

        <div :class="keyState.a ? 'bg-green-500' : 'bg-gray-700'" class="p-4 rounded">A</div>
        <div :class="keyState.s ? 'bg-green-500' : 'bg-gray-700'" class="p-4 rounded">S</div>
        <div :class="keyState.d ? 'bg-green-500' : 'bg-gray-700'" class="p-4 rounded">D</div>
    </div>
</div>

<script>
function controller() {
    return {
        connected: false,
        characteristic: null,
        keyState: { w: false, a: false, s: false, d: false, q: false, e: false },

        SERVICE_UUID: '6e400001-b5a3-f393-e0a9-e50e24dcca9e',
        CHARACTERISTIC_UUID: '6e400002-b5a3-f393-e0a9-e50e24dcca9e',

        async connect() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [this.SERVICE_UUID] }]
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(this.SERVICE_UUID);
                this.characteristic = await service.getCharacteristic(this.CHARACTERISTIC_UUID);

                this.connected = true;
            } catch (e) {
                console.error(e);
            }
        },

        send(msg) {
            if (!this.characteristic) return;
            const encoder = new TextEncoder();
            this.characteristic.writeValue(encoder.encode(msg + "\n"));
        },

        handleKeyDown(key) {
            if (this.keyState[key]) return;
            this.keyState[key] = true;
            this.send(key.toUpperCase() + "_DOWN");
        },

        handleKeyUp(key) {
            if (!this.keyState[key]) return;
            this.keyState[key] = false;
            this.send(key.toUpperCase() + "_UP");
        },

        init() {
            window.addEventListener('keydown', (e) => {
                const key = e.key.toLowerCase();
                if (['w','a','s','d'].includes(key)) {
                    this.handleKeyDown(key);
                }
            });

            window.addEventListener('keyup', (e) => {
                const key = e.key.toLowerCase();
                if (['w','a','s','d'].includes(key)) {
                    this.handleKeyUp(key);
                }
            });
        }
    }
}
</script>

</body>
</html>
